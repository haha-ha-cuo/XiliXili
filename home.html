<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - XiliXili</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>
    <header class="nav">
        <div class="nav-brand">XiliXili</div>
        <ul class="nav-links">
            <li class="nav-link"><a href="main.html">首页</a></li>
            <li class="nav-link"><a href="home.html" class="active">个人中心</a></li>
            <li class="nav-link"><a href="login.html">登录</a></li>
        </ul>
        <div class="search-container">
            <input class="search-input" type="text" placeholder="搜索...">
            <button class="search-button"><img src="audio/search.svg" alt="search"></button>
        </div>
    </header>

    <main class="home-container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-item">
                    <img src="audio/home.svg" alt="home">
                    <a href="main.html">首页</a>
                </div>
                <div class="sidebar-item active">
                    <img src="audio/login.svg" alt="login">
                    <a href="login.html">登录</a>
                </div>
                <div class="sidebar-item">
                    <img src="audio/register.svg" alt="register">
                    <a href="#">注册</a>
                </div>
                <div class="sidebar-item">
                    <img src="audio/about.svg" alt="about">
                    <a href="#">关于</a>
                </div>
                <div class="sidebar-item">
                    <img src="audio/help.svg" alt="help">
                    <a href="#">帮助</a>
                </div>
                <div class="sidebar-item">
                    <img src="audio/set.svg" alt="settings">
                    <a href="#">设置</a>
                </div>
            </nav>
        </aside>

        <div class="content-area">
            <div class="main-content">
                <section class="card">
                    <h2>最新动态</h2>
                    <div class="card-content">
                        <p>欢迎来到您的个人中心！</p>
                    </div>
                </section>

                <section class="card">
                    <h2>近期活跃情况</h2>
                    <div class="card-content">
                        <p>这里会放每周的数据曲线</p>
                        <div class="activity-chart">
                            <!-- 图表将在这里显示 -->
                            <div class="placeholder-chart"></div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h3>为你的作品添加封面</h3>
                    <div class="card-content">
                        <div class="upload-area">
                            <img src="#" alt="上传封面" class="upload-icon">
                            <p>点击上传图片</p>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h3>上传作品</h3>
                    <div class="card-content">
                        <div class="upload-area">
                            <p>支持 mp4/word 格式</p>
                            <button class="btn">选择文件</button>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h3>作品推荐</h3>
                    <div class="card-content">
                        <div class="recommendations">
                            <div class="recommendation-item">作品1</div>
                            <div class="recommendation-item">作品2</div>
                            <div class="recommendation-item">作品3</div>
                        </div>
                    </div>
                </section>
            </div>

            <aside class="sidebar-right">
                <div class="card">
                    <div class="card-header">
                        <h2>通知</h2>
                        <img src="audio/notice.svg" alt="notice">
                    </div>
                    <div class="card-content">
                        <p>这里会放一些近期的消息</p>
                        <ul class="notification-list">
                            <li>系统通知：平台已更新到最新版本</li>
                            <li>您的作品《示例》获得了10个赞</li>
                            <li>新功能上线：现在可以使用AI辅助创作</li>
                        </ul>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <p>© 2025 XiliXili. All rights reserved.</p>
    </footer>
</body>

</html>
